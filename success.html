<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Confirmado</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            box-sizing: border-box;
            padding: 20px;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 12px;
        }
        
        .row:last-child { margin-bottom: 0; }
        
        .label { 
            color: #666; 
            font-size: 14px; 
            flex-shrink: 0;
        }
        
        .value { 
            font-weight: bold; 
            font-size: 14px; 
            text-align: right;
        }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            margin: 20px -20px; 
            position: relative;
        }

        /* Ícone de Sucesso Animado */
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            animation: scaleUp 0.3s ease-out;
        }

        @keyframes scaleUp {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .status-text {
            color: #2e7d32;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .sub-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        
        .btn {
            background-color: #2e7d32;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background-color: #1b5e20;
        }

        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2e7d32;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1f8e9;
            border-radius: 8px;
        }

        @media (max-width: 320px) {
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </div>

    <p class="status-text">Payment Confirmed!</p>
    <p class="sub-text">
        Your transaction was successful. Your access has been released.
    </p>

    <div class="details">
        <div class="row">
            <span class="label">Status</span>
            <span class="value" style="color: #2e7d32;">Approved</span>
        </div>
        <div class="row">
            <span class="label">Date</span>
            <span class="value" id="current-date">--/--/----</span>
        </div>
        <div class="row">
            <span class="label">Amount</span>
            <span class="value">15.00 BRL</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="security-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        Secure Access Granted
    </div>

    <a href="dashboard" class="btn">
        Success, continue to access
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </a>

</div>

<script>
    const dateElement = document.getElementById('current-date');
    const today = new Date();
    dateElement.textContent = today.toLocaleDateString('pt-BR');
</script>

</body>
</html>
