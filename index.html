<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processamento de Pagamento</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            box-sizing: border-box;
            padding: 20px;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Alinha ao topo caso o texto quebre */
            margin-bottom: 10px;
            gap: 10px; /* Garante espaço entre label e value */
        }
        
        .row:last-child { margin-bottom: 0; }
        
        .label { 
            color: #666; 
            font-size: 14px; 
            flex-shrink: 0; /* Impede que o rótulo seja esmagado */
        }
        
        .value { 
            font-weight: bold; 
            font-size: 14px; 
            text-align: right;
            word-break: break-word; /* Quebra palavras longas se necessário */
            overflow-wrap: break-word;
        }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            margin: 20px -20px; 
            position: relative;
        }
        
        .summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            padding: 10px 0 20px 0;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4682b4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .btn {
            background-color: #3e7085;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
            margin: 0 auto;
            display: block;
        }

        @media (max-width: 320px) {
            .container { padding: 15px; }
            .divider { margin: 15px -15px; }
            .label, .value { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="details">
        <div class="row">
            <span class="label">Package Price</span>
            <span class="value">15.00 BRL</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <div class="row">
            <span class="label">Description</span>
            <span class="value">Single-use access – payment required for each new access</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="summary">
        <span>Total Summary</span>
        <span>15.00 BRL</span>
    </div>

    <div class="loader"></div>

    <p class="status-text">
        Processing payment verification... This may take a few minutes.
    </p>

    <button class="btn">Verifying...</button>
</div>

</body>
</html>
