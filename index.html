<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processamento de Pagamento</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            box-sizing: border-box;
            padding: 20px;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 12px;
        }
        
        .row:last-child { margin-bottom: 0; }
        
        .label { 
            color: #666; 
            font-size: 14px; 
            flex-shrink: 0;
        }
        
        .value { 
            font-weight: bold; 
            font-size: 14px; 
            text-align: right;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            margin: 20px -20px; 
            position: relative;
        }
        
        .summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            padding: 10px 0 20px 0;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4682b4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .btn {
            background-color: #3e7085;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
        }

        /* Barra de Segurança e Logos */
        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2e7d32;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1f8e9;
            border-radius: 8px;
        }

        .payment-methods {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            opacity: 0.7;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .payment-methods img {
            height: 20px;
            filter: grayscale(20%);
        }

        @media (max-width: 320px) {
            .container { padding: 15px; }
            .label, .value { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="details">
        <div class="row">
            <span class="label">Package Price</span>
            <span class="value">15.00 BRL</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <div class="row">
            <span class="label">Access Type</span>
            <span class="value">Read-Only Data Access</span>
        </div>
        <div class="row">
            <span class="label">Description</span>
            <span class="value">Single-use access – payment required for each new access</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="summary">
        <span>Total Summary</span>
        <span>15.00 BRL</span>
    </div>

    <div class="loader"></div>

    <p class="status-text">
        Processing payment verification... This may take a few minutes.
    </p>

    <div class="security-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        Ambiente Seguro & Criptografado
    </div>

    <button class="btn">Verifying...</button>

    <div class="payment-methods">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/aa/Pix_logo.svg" alt="Pix">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
    </div>
</div>

</body>
</html>
