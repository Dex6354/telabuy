<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processamento de Pagamento</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Garante que o corpo ocupe toda a altura da tela */
            margin: 0;
            color: #333;
            box-sizing: border-box; /* Garante que padding/border não aumentem o tamanho */
            padding: 20px; /* Adiciona um pequeno espaçamento nas bordas da tela */
        }
        
        *, *:before, *:after {
            box-sizing: inherit; /* Aplica border-box globalmente */
        }

        .container {
            background: white;
            width: 100%; /* Ocupa toda a largura disponível */
            max-width: 400px; /* Limita a largura máxima para telas maiores */
            padding: 20px; /* Reduz o padding para telas menores */
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px; /* Reduz o padding para telas menores */
            text-align: left;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center; /* Alinha os itens verticalmente */
            margin-bottom: 10px;
        }
        
        .row:last-child { margin-bottom: 0; }
        
        .label { 
            color: #666; 
            font-size: 14px; 
            flex-grow: 1; /* Permite que o rótulo cresça */
            margin-right: 10px; /* Pequeno espaçamento do valor */
        }
        
        .value { 
            font-weight: bold; 
            font-size: 14px; 
            white-space: nowrap; /* Impede que o valor quebre de linha */
        }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            /* Ajuste o margin-left/right negativo para compensar o padding do container */
            margin: 20px -20px; 
            position: relative;
        }
        
        .summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            padding: 10px 0 20px 0; /* Reduz padding para telas menores */
        }

        .summary span {
            white-space: nowrap; /* Impede quebras de linha no total */
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4682b4;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 20px; /* Reduz margin para telas menores */
            line-height: 1.4;
        }
        
        .btn {
            background-color: #3e7085;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%; /* Ocupa toda a largura no mobile */
            max-width: 200px; /* Limita a largura máxima */
            margin: 0 auto; /* Centraliza o botão */
            display: block; /* Garante que o botão ocupe toda a linha */
        }

        /* Ajustes adicionais para telas extremamente pequenas */
        @media (max-width: 320px) {
            .container {
                padding: 15px;
            }
            .divider {
                margin: 15px -15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="details">
        <div class="row">
            <span class="label">Package Price</span>
            <span class="value">15.00 BRL</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <div class="row">
            <span class="label">Description</span>
            <span class="value">Single-use access – payment required for each new access</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="summary">
        <span>Total Summary</span>
        <span>15.00 BRL</span>
    </div>

    <div class="loader"></div>

    <p class="status-text">
        Processing payment verification... This may take a few minutes.
    </p>

    <button class="btn">Verifying...</button>
</div>

</body>
</html>
