<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processamento de Pagamento</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            box-sizing: border-box;
            padding: 20px;
        }
        
        *, *:before, *:after {
            box-sizing: inherit;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .details {
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 15px;
            text-align: left;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
            gap: 12px;
        }
        
        .row:last-child { margin-bottom: 0; }
        
        .label { 
            color: #666; 
            font-size: 14px; 
            flex-shrink: 0;
        }
        
        .value { 
            font-weight: bold; 
            font-size: 14px; 
            text-align: right;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .divider {
            border-top: 1px dashed #b0bec5;
            margin: 20px -20px; 
            position: relative;
        }
        
        .summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            padding: 10px 0 20px 0;
        }

        .status-text {
            color: #78909c;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .btn {
            background-color: #3e7085;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2c5161;
        }

        .security-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #2e7d32;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            padding: 8px;
            background: #f1f8e9;
            border-radius: 8px;
        }

        .payment-methods {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            opacity: 0.8;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .payment-methods img {
            height: 22px;
            object-fit: contain;
        }

        @media (max-width: 320px) {
            .container { padding: 15px; }
            .label, .value { font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="details">
        <div class="row">
            <span class="label">Package Price</span>
            <span class="value">15.00 BRL</span>
        </div>
        <div class="row">
            <span class="label">Date Access</span>
            <span class="value" id="current-date">--/--/----</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
        <div class="row">
            <span class="label">Access Type</span>
            <span class="value">Read-Only Data Access</span>
        </div>
        <div class="row">
            <span class="label">Description</span>
            <span class="value">Single-use access – payment required for each new access</span>
        </div>
    </div>

    <div class="divider"></div>

    <div class="summary">
        <span>Total Summary</span>
        <span>15.00 BRL</span>
    </div>

    <p class="status-text">
        Please complete your payment to gain immediate access.
    </p>

    <div class="security-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        Secure & Encrypted Environment
    </div>

    <button class="btn">
        Check out 
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>

    <div class="payment-methods">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/50/Pix_%28Brazil%29_logo.svg/3840px-Pix_%28Brazil%29_logo.svg.png" alt="Pix">
        <img src="https://logos-world.net/wp-content/uploads/2020/09/Mastercard-Logo.png" alt="Mastercard">
        <img src="https://logosmarcas.net/wp-content/uploads/2020/04/Visa-Logo-2014%E2%80%93presente.jpg" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg" alt="Bitcoin">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
    </div>
</div>

<script>
    // Define a data atual no formato DD/MM/AAAA
    const dateElement = document.getElementById('current-date');
    const today = new Date();
    const formattedDate = today.toLocaleDateString('pt-BR');
    dateElement.textContent = formattedDate;
</script>

</body>
</html>
